<div class="bg-stone-50 min-h-screen py-10 px-4 md:px-8">
  <div class="max-w-2xl mx-auto">
    
    <h1 class="text-3xl font-bold text-amber-900 mb-1">
      {{ editando ? 'Actualizar registro' : 'Registrar nuevo precio' }}
    </h1>
    <p class="text-gray-500 mb-8">{{ editando ? 'Modifica los datos del precio seleccionado.' : 'Ingresa la información del precio del cacao que deseas registrar.' }}</p>

    @if (error) {
      <p class="text-red-500 mb-4">Por favor completa todos los campos obligatorios.</p>
    }

    <div class="bg-white rounded-xl shadow p-6 md:p-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div>
          <label class="block text-gray-700 font-medium mb-1">Precio <span class="text-red-500">*</span></label>
          <input type="number" [(ngModel)]="precio" placeholder="Ej: 12.500"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>

        <div>
          <label class="block text-gray-700 font-medium mb-1">Unidad de medida <span class="text-red-500">*</span></label>
          <select [(ngModel)]="unidad" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            <option value="">Selecciona una unidad</option>
            <option value="USD/kg">USD/kg</option>
            <option value="USD/ton">USD/ton</option>
            <option value="COP/kg">COP/kg</option>
            <option value="COP/ton">COP/ton</option>
          </select>
        </div>

        <div>
          <label class="block text-gray-700 font-medium mb-1">Fecha <span class="text-red-500">*</span></label>
          <input type="date" [(ngModel)]="fecha" [max]="hoy"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>

        <div>
          <label class="block text-gray-700 font-medium mb-1">Fuente</label>
          <input type="text" [(ngModel)]="fuente" placeholder="Ej: Bolsa de Nueva York"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>

        <div>
          <label class="block text-gray-700 font-medium mb-1">Región</label>
          <input type="text" [(ngModel)]="region" placeholder="Ej: Colombia"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"/>
        </div>

      </div>

      <div class="flex justify-end gap-4 mt-8">
        <a routerLink="/historial" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 transition">
          Cancelar
        </a>
        <button (click)="guardar()" class="bg-green-700 text-white px-6 py-2 rounded-lg hover:bg-green-800 transition font-medium">
          {{ editando ? 'Actualizar' : 'Registrar' }}
        </button>
      </div>
    </div>

  </div>
</div>
